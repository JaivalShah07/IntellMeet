services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/intellmeet
      JWT_SECRET: intellmeet_dev_secret_change_in_production
      CLIENT_URL: http://localhost:5173
      NODE_ENV: production
    depends_on:
      - mongo

volumes:
  mongo_data:
